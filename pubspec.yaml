name: xo_game
description: A new Flutter project.

# Prevent accidental publishing to pub.dev
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.2
  flutter_lints: ^2.0.0  # Linting package for best practices

flutter:
  uses-material-design: true
  assets:
    - assets/images/  # Ensure this folder contains your icon image

flutter_icons:
  android: true   # To generate the icon for Android devices
  ios: true       # To generate the icon for iOS devices
  image_path: "assets/images/xo.png"  # Path to your icon image
